<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->

    <!-- React & ReactDOM -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Custom scrollbar for text area and scaffold */
        textarea::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track, .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover, .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Cache TTS Voices on load
        window.cachedVoices = [];
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.cachedVoices = window.speechSynthesis.getVoices();
            };
        }

        // --- Icon Components ---
        const SvgIcon = ({ d, points, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                {props.children}
            </svg>
        );

        const Home = (p) => <SvgIcon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
        const ArrowRight = (p) => <SvgIcon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></SvgIcon>;
        const ArrowLeft = (p) => <SvgIcon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></SvgIcon>;
        const BarChart2 = (p) => <SvgIcon {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></SvgIcon>;
        const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SvgIcon>;
        const Play = (p) => <SvgIcon {...p}><polygon points="5 3 19 12 5 21 5 3"/></SvgIcon>;
        const Lightbulb = (p) => <SvgIcon {...p}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></SvgIcon>;
        const Award = (p) => <SvgIcon {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></SvgIcon>;
        const FileText = (p) => <SvgIcon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></SvgIcon>;
        const Copy = (p) => <SvgIcon {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></SvgIcon>;
        const BookOpen = (p) => <SvgIcon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></SvgIcon>;
        const Layers = (p) => <SvgIcon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></SvgIcon>;
        const ListChecks = (p) => <SvgIcon {...p}><path d="M11 6h9"/><path d="M11 12h9"/><path d="M11 18h9"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></SvgIcon>;
        const Edit3 = (p) => <SvgIcon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></SvgIcon>;
        const AlertTriangle = (p) => <SvgIcon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></SvgIcon>;

        // --- Helper for 1x Speech Speed + specific Voices (Andrew, Brian, Emma) ---
        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0; 
                
                let voices = window.speechSynthesis.getVoices();
                if (voices.length === 0) voices = window.cachedVoices;

                // Priority: Microsoft multilingual online Andrew, Brian, Emma
                let preferredVoice = voices.find(v => 
                    (v.name.includes('Andrew') || v.name.includes('Brian') || v.name.includes('Emma')) && v.name.includes('Online')
                );
                
                if (!preferredVoice) {
                    preferredVoice = voices.find(v => v.name.includes('Andrew') || v.name.includes('Brian') || v.name.includes('Emma'));
                }

                if (preferredVoice) {
                    utterance.voice = preferredVoice;
                }

                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Speech synthesis not supported in this browser.");
            }
        };

        // --- Safe Copy for HTML/iFrames ---
        const fallbackCopyTextToClipboard = (text, setCopied) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            } catch (err) {}
            document.body.removeChild(textArea);
        };

        // --- Compact Diagram Components with Expanded viewBox for Axis Visibility ---

                    <rect x="170" y={250 - (40 * 0.75)} width="40" height={40 * 0.75} fill="#10b981" />
                    <text x="380" y="270" textAnchor="middle" fontSize="12" fontWeight="bold" fill="#334155">2020</text>
                    <rect x="310" y={250 - (240 * 0.75)} width="40" height={240 * 0.75} fill="#3b82f6" />
                    <rect x="360" y={250 - (70 * 0.75)} width="40" height={70 * 0.75} fill="#f59e0b" />
                    <rect x="410" y={250 - (210 * 0.75)} width="40" height={210 * 0.75} fill="#10b981" />
                    <g transform="translate(150, 290)">

        // 5. Bar Chart 2 (Part-Time Jobs)
        const IeltsBarChart2 = () => (

            const nextStep = () => {
                window.speechSynthesis.cancel();
                setCurrentStep(prev => Math.min(prev + 1, totalSteps));
            }
            const prevStep = () => {
                window.speechSynthesis.cancel();
                setCurrentStep(prev => Math.max(prev - 1, 1));
            }
            const goHome = () => {
                window.speechSynthesis.cancel();
                setCurrentStep(1);
            }

            const stepIcons = [
                { id: 1, name: "Blueprint", icon: <BookOpen className="w-3 h-3" /> },
                { id: 2, name: "Intro", icon: <Layers className="w-3 h-3" /> },
                { id: 3, name: "Overview", icon: <Layers className="w-3 h-3" /> },
                { id: 4, name: "Body", icon: <Layers className="w-3 h-3" /> },
                { id: 5, name: "Templates", icon: <FileText className="w-3 h-3" /> },
                { id: 6, name: "Final", icon: <ListChecks className="w-3 h-3" /> },
                { id: 7, name: "Practice", icon: <Edit3 className="w-3 h-3" /> }
            ];

            return (
                <div className="min-h-screen pb-10">
                <div className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
                    {/* Expanded blank margin width - Using max-w-[98%] xl:max-w-[1600px] */}
                    <div className="max-w-[98%] xl:max-w-[1600px] mx-auto px-4 py-3 flex justify-between items-center">
                    <button 
                        onClick={goHome}
                        className="flex items-center text-slate-600 hover:text-indigo-600 font-medium transition-colors p-1"
                    >
                        <Home className="w-5 h-5 md:mr-2" />
                        <span className="hidden md:inline text-sm font-bold">Home</span>
                    </button>
                    
                    <div className="hidden md:flex space-x-2 lg:space-x-4 items-center">
                        {stepIcons.map((step) => (
                            <div key={step.id} className="flex items-center">
                                <div className={`flex items-center justify-center w-8 h-8 rounded-full border-2 transition-all cursor-pointer ${
                                    currentStep === step.id ? 'border-indigo-600 bg-indigo-600 text-white shadow-md' : 
                                    currentStep > step.id ? 'border-indigo-400 bg-indigo-100 text-indigo-600 hover:bg-indigo-200' : 'border-slate-200 text-slate-400'
                                }`} onClick={() => { window.speechSynthesis.cancel(); setCurrentStep(step.id); }}>
                                    {currentStep > step.id ? <CheckCircle className="w-4 h-4" /> : <span className="text-xs font-bold">{step.id}</span>}
                                </div>
                                <span className={`ml-2 text-xs font-bold uppercase tracking-wider ${currentStep === step.id ? 'text-indigo-800' : 'text-slate-400 hidden lg:inline'}`}>
                                    {step.name}
                                </span>
                                {step.id !== totalSteps && <div className="w-4 lg:w-8 border-b-2 border-slate-200 ml-2 lg:ml-4"></div>}
                            </div>
                        ))}
                    </div>

                    <div className="md:hidden text-sm font-bold text-slate-400 uppercase tracking-widest">
                        Step {currentStep}/{totalSteps}
                    </div>

                    <div className="flex space-x-2">
                        <button 
                        onClick={prevStep}
                        disabled={currentStep === 1}
                        className="flex items-center px-3 py-1.5 bg-white border border-slate-300 rounded shadow-sm text-slate-700 hover:bg-slate-50 disabled:opacity-50 transition text-sm font-medium"
                        >
                        <ArrowLeft className="w-4 h-4 sm:mr-1" /> 
                        <span className="hidden sm:inline">Back</span>
                        </button>
                        <button 
                        onClick={nextStep}
                        disabled={currentStep === totalSteps}
                        className="flex items-center px-3 py-1.5 bg-indigo-600 border border-indigo-600 rounded shadow-sm text-white hover:bg-indigo-700 disabled:opacity-50 transition text-sm font-medium"
                        >
                        <span className="hidden sm:inline">Next</span> 
                        <ArrowRight className="w-4 h-4 sm:ml-1" />
                        </button>
                    </div>
                    </div>
                </div>

                {/* Main Content Area - Wide margins */}
                <div className="max-w-[98%] xl:max-w-[1600px] mx-auto mt-6 px-4">
                    <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200 p-6 w-full">
                    
                    {/* Two-Column Layout for Steps 1-4 */}
                    {currentStep < 5 && (
                        <div className="grid lg:grid-cols-2 gap-8 animate-fade-in items-start w-full">
                            
                            {/* LEFT COLUMN: Prompt and 75% Graph */}
                            <div className="flex flex-col items-center w-full gap-4">
                                <div 
                                    onClick={() => speakText("The bar chart below shows the changes in extracurricular club memberships (Sports, Drama, Coding) among secondary students at Lincoln High School from 2015 to 2020. Summarize the information by selecting and reporting the main features.")}
                                    className="bg-slate-800 text-white p-4 rounded-lg shadow-inner w-full cursor-pointer hover:bg-slate-700 transition"
                                    title="Click to listen"
                                >
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center mb-2">
                                    <BarChart2 className="w-4 h-4 mr-2" /> Exam Prompt
                                    </span>
                                    <p className="text-sm font-medium leading-relaxed">
                                    "The bar chart below shows the changes in extracurricular club memberships (Sports, Drama, Coding) among secondary students at Lincoln High School from 2015 to 2020. Summarize the information by selecting and reporting the main features."
                                    </p>
                                </div>
                                
                                {/* 75% Width for the Bar Chart */}
                                <div className="w-[75%] mt-2">
                                    <IeltsBarChart />
                                </div>
                            </div>

                            {/* RIGHT COLUMN: The Step Content */}
                            <div className="w-full">
                                {currentStep === 1 && <Step1Blueprint />}
                                {currentStep === 2 && <Step2Intro />}
                                {currentStep === 3 && <Step3Overview />}
                                {currentStep === 4 && <Step4Body />}
                            </div>
                        </div>
                    )}

                    {/* Full Width for Later Steps */}
                    {currentStep === 5 && <Step5Templates />}
                    {currentStep === 6 && <Step6Final />}
                    {currentStep === 7 && <Step7Practice />}
                    
                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
