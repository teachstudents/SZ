                      <div className={`mt-3 p-3 rounded-md text-sm font-bold flex items-center gap-2 ${feedback[qIdx] ? 'bg-green-900/20 text-green-400' : 'bg-rose-900/20 text-rose-400'}`}>
                        {feedback[qIdx] ? <i className="fa-regular fa-circle-check text-base"></i> : <i className="fa-solid fa-times text-base"></i>}
                        {feedback[qIdx] ? 'Correct!' : 'Incorrect'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              
              {mcqs.length > 5 && (
                <div className="mt-5 pt-4 border-t border-slate-800 text-center">
                  <button onClick={() => setShowExtended(!showExtended)} className="bg-teal-600 hover:bg-teal-500 text-white font-bold py-2.5 px-6 rounded-md transition-colors text-sm">
                    {showExtended ? "Show Fewer" : "Load 10 More"}
                  </button>
                </div>
              )}
            </div>
          );
        };

        const PracticeGamePage = ({ vocabulary, unitTitle, onExit, handleSpeak }) => {
          const itemsPerRound = 5;
          const totalRounds = Math.ceil(vocabulary.length / itemsPerRound);
          const [round, setRound] = useState(0);
          const [selectedWord, setSelectedWord] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);
          const [definitions, setDefinitions] = useState([]);
          const [roundComplete, setRoundComplete] = useState(false);

          useEffect(() => {
            const currentVocab = vocabulary.slice(round * itemsPerRound, (round + 1) * itemsPerRound);
            setDefinitions([...currentVocab].sort(() => Math.random() - 0.5));
            setMatchedPairs([]);
            setSelectedWord(null);
            setRoundComplete(false);
          }, [round, vocabulary]);

          const currentVocab = vocabulary.slice(round * itemsPerRound, (round + 1) * itemsPerRound);

          const handleWordClick = (word) => {
            if (matchedPairs.includes(word)) return;
            handleSpeak(word);
            setSelectedWord(word);
          };

          const handleDefClick = (defObj) => {
            if (!selectedWord) return;
            handleSpeak(defObj.definition);
            if (defObj.word === selectedWord) {
              const newMatches = [...matchedPairs, selectedWord];
              setMatchedPairs(newMatches);
              
              try {
                  confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 }, colors: ['#166534', '#22c55e', '#facc15'] });
                  const audio = new Audio('https://actions.google.com/sounds/v1/ui/proxima_spacious_correct.ogg');
                  audio.volume = 0.5;
                  audio.play();
              } catch(e) { console.log('Audio/Confetti error blocked', e); }

              if (newMatches.length === currentVocab.length) setTimeout(() => setRoundComplete(true), 800); 
            }
            setSelectedWord(null);
          };

          return (
            <div className="fixed inset-0 z-[100] bg-slate-900 flex flex-col font-sans text-slate-800 overflow-hidden animate-fade-in">
                <div className="bg-slate-800 text-white px-5 py-4 flex justify-between items-center shadow-md shrink-0">
                    <button onClick={onExit} className="flex items-center gap-2 hover:text-teal-400 transition-colors font-bold bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm md:text-base">
                        <i className="fa-solid fa-arrow-left"></i> Back
                    </button>
                    <h2 className="text-lg md:text-xl font-bold text-teal-400 flex items-center gap-2">
                        <i className="fa-solid fa-gamepad"></i> {unitTitle} Match
                    </h2>
                    <div className="text-slate-300 font-bold bg-slate-900 px-4 py-2 rounded-lg border border-slate-700 text-sm md:text-base">
                        Round {round + 1}/{totalRounds}
                    </div>
                </div>

                <div className="flex-1 flex flex-col items-center justify-center p-5 bg-slate-50 relative">
                    <div className="w-full max-w-5xl h-full flex flex-col">
                        {!roundComplete ? (
                            <div className="flex gap-3 md:gap-6 h-full pb-3 pt-2">
                                <div className="flex-1 flex flex-col gap-3 md:gap-4">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0 text-xs">Terms</h4>
                                    {currentVocab.map((v) => (
                                        <button key={v.word} onClick={() => handleWordClick(v.word)} disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-center px-3 py-3 md:py-4 rounded-xl border-2 transition-all text-sm md:text-lg font-bold shadow-sm ${
                                            matchedPairs.includes(v.word) ? 'bg-green-800 border-green-900 text-white cursor-not-allowed opacity-90 shadow-inner' : selectedWord === v.word ? 'bg-indigo-50 border-indigo-500 text-indigo-800 scale-[1.02] shadow-md' : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300'
                                          }`}>
                                          {v.word.toLowerCase()}
                                        </button>
                                      ))}
                                </div>
                                <div className="flex-[2] flex flex-col gap-3 md:gap-4">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0 text-xs">Definitions</h4>
                                    {definitions.map((v, i) => (
                                        <button key={i} onClick={() => handleDefClick(v)} disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-start px-4 py-3 md:py-4 rounded-xl border-2 transition-all text-sm md:text-base font-medium leading-snug shadow-sm ${
                                            matchedPairs.includes(v.word) ? 'bg-green-800 border-green-900 text-white cursor-not-allowed opacity-90 shadow-inner' : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-slate-50'
                                          }`}>
                                          {v.definition}
                                        </button>
                                      ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center animate-pop-in">
                                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-xl border border-slate-200 flex flex-col items-center max-w-md text-center">
                                    <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-4">
                                        <i className="fa-solid fa-check text-4xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-extrabold text-slate-800 mb-3">
                                        {round < totalRounds - 1 ? 'Round Complete!' : 'Unit Complete!'}
                                    </h2>
                                    <p className="text-slate-500 text-sm mb-6">
                                        {round < totalRounds - 1 ? "Great job. Ready for the next set?" : "You've matched all vocabulary for this unit."}
                                    </p>
                                    {round < totalRounds - 1 ? (
                                        <button onClick={() => setRound(round + 1)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-base font-bold py-3 px-8 rounded-lg shadow-sm transition-transform hover:scale-105">
                                            Next Round <i className="fa-solid fa-arrow-right ml-2"></i>
                                        </button>
                                    ) : (
                                        <div className="flex gap-3 w-full">
                                            <button onClick={() => setRound(0)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 px-4 rounded-lg transition-colors">Play Again</button>
                                            <button onClick={onExit} className="flex-1 bg-teal-500 hover:bg-teal-600 text-white text-sm font-bold py-3 px-4 rounded-lg shadow-sm transition-transform hover:scale-105">Dashboard</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
          );
        };

        function App() {
          const [activeUnit, setActiveUnit] = useState(unitData[0]);
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          const [activeTab, setActiveTab] = useState("overview");
          const [showModelAnswer, setShowModelAnswer] = useState({});
          const voiceIndexRef = useRef(0);

          useEffect(() => {
            return () => {
              if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            };
          }, []);

          const handleSpeak = (text, isConversation = false) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            // Clean text: Replace underscores with "blank", and strip out IELTS answer markers.
            let cleanText = text.replace(/_+/g, "blank").replace(/\s*\((True|False|Not Given)\)/gi, "");

            const loadVoices = () => {
              const voices = window.speechSynthesis.getVoices();
              
              // Filter for high-quality Microsoft voices if available
              const validVoices = voices.filter(v => 
                v.name.includes("Microsoft") &&
                v.name.includes("Online") &&
                v.lang.startsWith("en")
              );

              const defaultVoices = validVoices.length > 0 ? validVoices : voices;

              if (isConversation && cleanText.includes(":")) {
                  // Conversation Mode: Split by newlines and assign voices to speakers
                  const lines = cleanText.split('\n');
                  const speakers = [...new Set(lines.map(l => l.split(':')[0].trim()).filter(s => s && l.includes(':')))];
                  
                  const voiceMap = {};
                  const emmaVoice = defaultVoices.find(v => v.name.includes("Emma")) || defaultVoices[0];
                  const andrewVoice = defaultVoices.find(v => v.name.includes("Andrew")) || defaultVoices[1] || defaultVoices[0];

                  speakers.forEach((speaker, index) => {
                      voiceMap[speaker] = index % 2 === 0 ? emmaVoice : andrewVoice;
                  });

                  lines.forEach(line => {
                      const match = line.match(/^(.*?):\s*(.*)$/);
                      if (match) {
                          const speaker = match[1].trim();
                          const spokenText = match[2];
                          const utter = new SpeechSynthesisUtterance(spokenText);
                          utter.rate = 0.85;
                          utter.voice = voiceMap[speaker];
                          window.speechSynthesis.speak(utter);
                      } else if (line.trim().length > 0) {
                          const utter = new SpeechSynthesisUtterance(line);
                          utter.rate = 0.85;
                          utter.voice = emmaVoice;
                          window.speechSynthesis.speak(utter);
                      }
                  });
              } else {
                  // Standard Single-Voice Mode
                  const utter = new SpeechSynthesisUtterance(cleanText);
                  utter.rate = 0.85; 

                  if (defaultVoices.length === 0) {
                    console.warn("TTS: No suitable voices found.");
                    return;
                  }

                  const selected = defaultVoices[voiceIndexRef.current % defaultVoices.length];
                  voiceIndexRef.current += 1;

                  utter.voice = selected;
                  window.speechSynthesis.speak(utter);
              }
            };

            if (window.speechSynthesis.getVoices().length === 0) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            } else {
              loadVoices();
            }
          };

          const selectUnit = (unit) => {
            setActiveUnit(unit);
            setIsSidebarOpen(false);
            setActiveTab("overview");
            setShowModelAnswer({});
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
          };

          const toggleModelAnswer = (idx) => setShowModelAnswer(prev => ({ ...prev, [idx]: !prev[idx] }));

          const tabs = [
            { id: "overview", label: "Overview", icon: "fa-solid fa-book-open" },
            { id: "vocab", label: "Vocabulary", icon: "fa-solid fa-book" },
            { id: "speaking", label: "Speaking", icon: "fa-solid fa-microphone" },
            { id: "reading", label: "Reading", icon: "fa-solid fa-book" },
            { id: "listening", label: "Listening", icon: "fa-solid fa-headphones" },
            { id: "grammar", label: "Writing & Grammar", icon: "fa-solid fa-pen-to-square" },
            { id: "analysis", label: "Paragraph Analysis", icon: "fa-solid fa-magnifying-glass-chart" },
            { id: "testing", label: "Practice Tests", icon: "fa-solid fa-clipboard-list" },
            { id: "game", label: "Game", icon: "fa-solid fa-gamepad" }
          ];

          if (activeTab === "game") {
            return <PracticeGamePage vocabulary={activeUnit.vocabulary} unitTitle={activeUnit.title} onExit={() => setActiveTab("overview")} handleSpeak={handleSpeak} />;
          }

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
              
              {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-20" onClick={() => setIsSidebarOpen(false)} />}

              <div className={`fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-slate-300 transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                <div className="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                  <div>
                    <h1 className="text-base font-bold text-white flex items-center gap-2">
                      <i className="fa-solid fa-book-open text-teal-400"></i> IELTS Prep 
                    </h1>
                    <p className="text-[10px] text-slate-400 mt-0.5">Units 1 - 24</p>
                  </div>
                  <button className="text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-2 overflow-y-auto flex-1">
                  <ul className="space-y-1 pb-10">
                    {unitData.map((unit) => (
                      <li key={unit.id}>
                        <button onClick={() => selectUnit(unit)} className={`w-full flex items-center gap-2 px-3 py-2 rounded-md text-sm transition-colors ${activeUnit.id === unit.id ? 'bg-teal-500/10 text-teal-400 font-bold border border-teal-500/20' : 'hover:bg-slate-800 hover:text-white border border-transparent font-medium'}`}>
                          <i className={`${unit.icon} ${activeUnit.id === unit.id ? 'text-teal-400' : 'text-slate-500'} w-5 text-center text-lg`}></i>
                          Unit {unit.id}: {unit.title}
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>

              <div className="flex-1 flex flex-col h-full relative w-full">
                
                <header className="bg-white border-b border-slate-200 px-4 md:px-6 py-3 flex items-center justify-between shadow-sm shrink-0">
                  <div className="flex items-center gap-3">
                    <button className="text-slate-500 hover:text-indigo-600 bg-slate-100 p-2 rounded-lg transition-colors flex items-center gap-2" onClick={() => setIsSidebarOpen(true)}>
                      <i className="fa-solid fa-list text-base"></i><span className="font-bold text-sm hidden sm:inline">Units</span>
                    </button>
                    <div className="h-5 w-px bg-slate-200 hidden md:block"></div>
                    <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                      <span className="bg-teal-100 text-teal-800 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider w-fit">Unit {activeUnit.id}</span>
                      <h2 className="text-lg md:text-xl font-extrabold text-slate-800">{activeUnit.title}</h2>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-indigo-100 uppercase tracking-wide shadow-sm">
                    <i className="fa-solid fa-graduation-cap text-sm shrink-0"></i><span className="hidden sm:inline">Secondary Student Mode</span>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto bg-slate-50 p-3 md:p-5 scroll-smooth">
                  <div className="max-w-6xl mx-auto flex flex-col h-full">
                    
                    <div className="flex flex-wrap gap-2 pb-3 mb-4 border-b border-slate-200">
                      {tabs.map(tab => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                          className={`flex-grow sm:flex-grow-0 flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-bold text-sm transition-all border ${activeTab === tab.id ? 'border-indigo-600 text-indigo-700 bg-indigo-50 shadow-sm' : 'border-transparent text-slate-600 hover:text-slate-900 hover:bg-slate-100'}`}>
                          <i className={`${tab.icon} text-base`}></i> <span className="whitespace-nowrap">{tab.label}</span>
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 animate-fade-in pb-10">
                      
                      {/* OVERVIEW */}
                      {activeTab === "overview" && (
                        <div className="space-y-4">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button onClick={() => handleSpeak(activeUnit.content)} className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 text-left hover:border-teal-300 transition-all">
                              <h3 className="text-sm md:text-base font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-book-open text-indigo-500"></i> Academic Focus</h3>
                              <p className="text-slate-600 text-base md:text-lg font-medium leading-relaxed">{activeUnit.content}</p>
                            </button>
                            <button onClick={() => handleSpeak(activeUnit.secondaryExample)} className="bg-indigo-50 p-5 md:p-6 rounded-2xl border border-indigo-200 shadow-sm text-left hover:border-indigo-400 transition-all">
                              <h3 className="text-sm md:text-base font-bold text-indigo-900 mb-2 flex items-center gap-2"><i className="fa-solid fa-graduation-cap text-indigo-600"></i> High School Scenario</h3>
                              <p className="text-indigo-800 text-base md:text-lg font-bold leading-relaxed">{activeUnit.secondaryExample}</p>
                            </button>
                          </div>
                          <button onClick={() => handleSpeak(`Learning Outcomes: Listening: ${activeUnit.outcomes.listening} Reading: ${activeUnit.outcomes.reading} Writing: ${activeUnit.outcomes.writing} Speaking: ${activeUnit.outcomes.speaking} Grammar and Vocabulary: ${activeUnit.outcomes.grammarVocab}`)} className="w-full bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 mt-2 text-left hover:border-teal-300 transition-all">
                            <h3 className="text-sm md:text-base font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-bullseye text-rose-500"></i> Learning Outcomes</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                              {Object.entries(activeUnit.outcomes).map(([key, val]) => (
                                <div key={key} className={`flex items-start gap-3 ${key === 'grammarVocab' ? 'md:col-span-2 pt-3 border-t border-slate-100' : ''}`}>
                                   <i className={`fa-solid ${key==='listening'?'fa-headphones':key==='reading'?'fa-book':key==='writing'?'fa-pen-to-square':key==='speaking'?'fa-microphone':'fa-check-circle'} text-slate-400 text-lg mt-0.5 shrink-0`}></i>
                                   <div>
                                     <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{key}</span>
                                     <p className="text-base md:text-lg font-medium text-slate-700 leading-snug mt-1">{val}</p>
                                   </div>
                                </div>
                              ))}
                            </div>
                          </button>
                        </div>
                      )}

                      {/* VOCABULARY */}
                      {activeTab === "vocab" && (
                        <div className="space-y-5">
                          <div className="bg-slate-900 p-4 md:p-5 rounded-2xl text-slate-300 border border-slate-800 shadow-sm flex items-start gap-4">
                            <i className="fa-solid fa-book text-teal-400 text-2xl shrink-0 mt-1"></i>
                            <div>
                              <h4 className="text-base font-bold text-white mb-1">Key Vocabulary Groups</h4>
                              <p className="text-sm leading-relaxed">Core vocabulary seamlessly embedded into contextual example sentences.</p>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                            {activeUnit.vocabulary.map((v, i) => (
                              <button key={i} onClick={() => handleSpeak(v.word)} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-left hover:border-teal-400 transition-all active:scale-95 flex flex-col justify-between">
                                <div>
                                    <h4 className="text-lg md:text-xl font-extrabold text-slate-800 mb-2 lowercase">{v.word}</h4>
                                    <span className="inline-block bg-slate-100 text-slate-700 px-2 py-1 rounded text-[115%] font-bold mb-3 border border-slate-200 shadow-sm">{v.chinese}</span>
                                </div>
                                <p className="text-slate-600 text-sm md:text-base leading-snug font-medium italic border-t border-slate-100 pt-3">"{v.definition}"</p>
                              </button>
                            ))}
                          </div>
                          <UnitQuiz key={`quiz-${activeUnit.id}`} mcqs={activeUnit.mcqs} handleSpeak={handleSpeak} />
                        </div>
                      )}

                      {/* SPEAKING */}
                      {activeTab === "speaking" && (
                        <div className="space-y-6">
                          {activeUnit.speaking.map((section, idx) => (
                            <div key={idx} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                              <div className="bg-indigo-50 border-b border-indigo-100 p-4 flex items-center">
                                <h3 className="text-base md:text-lg font-bold text-indigo-900 flex items-center gap-2"><i className="fa-solid fa-microphone text-indigo-600"></i> {section.type}</h3>
                              </div>
                              <div className="p-5">
                                <button onClick={() => handleSpeak(section.questions.join(' '))} className="w-full text-left bg-white border border-slate-200 hover:border-teal-300 hover:bg-slate-50 p-5 rounded-xl transition-all shadow-sm mb-5 relative overflow-hidden">
                                  <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                                  <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Examiner Prompts</h4>
                                  <ul className="space-y-2 pl-4">
                                    {section.questions.map((q, qIdx) => <li key={qIdx} className="text-lg md:text-xl leading-relaxed text-slate-800 font-bold list-disc ml-2">{q}</li>)}
                                  </ul>
                                </button>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                                  <div className="bg-slate-50 border border-slate-200 rounded-xl p-5">
                                    <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><i className="fa-solid fa-pen-nib"></i> Useful Stems</h4>
                                    <ul className="space-y-2">
                                      {section.stems.map((stem, i) => (
                                        <li key={i}><button onClick={() => handleSpeak(stem)} className="text-left w-full bg-white border border-slate-200 p-3 rounded-lg text-base font-semibold text-slate-700 hover:border-teal-400 transition-colors shadow-sm">{stem}</button></li>
                                      ))}
                                    </ul>
                                  </div>
                                  <button onClick={() => handleSpeak(section.example)} className="text-left bg-indigo-50 border border-indigo-100 hover:border-indigo-300 rounded-xl p-5 transition-all shadow-sm">
                                    <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><i className="fa-regular fa-circle-check text-indigo-500"></i> Model Answer</h4>
                                    <p className="text-lg md:text-xl text-indigo-900 leading-relaxed font-bold italic">"{section.example}"</p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* READING & LISTENING */}
                      {(activeTab === "reading" || activeTab === "listening") && (() => {
                        const tabData = activeTab === "reading" ? activeUnit.reading : activeUnit.listening;
                        const icon = activeTab === "reading" ? "fa-book" : "fa-headphones";
                        const title = activeTab === "reading" ? "Reading Passage" : "Listening Transcript";
                        const bgClass = activeTab === "reading" ? "bg-white border-slate-200 text-slate-800" : "bg-slate-900 border-slate-800 text-white";
                        const innerBg = activeTab === "reading" ? "bg-slate-50 hover:bg-teal-50 border-slate-200" : "bg-slate-800 hover:bg-slate-700 border-slate-700";
                        const headClass = activeTab === "reading" ? "bg-slate-50 border-slate-200 text-slate-800" : "bg-slate-800 border-slate-700 text-white";
                        
                        return (
                          <div className={`rounded-2xl shadow-sm border overflow-hidden ${bgClass}`}>
                            <div className={`p-5 border-b ${headClass}`}>
                              <h3 className="text-lg font-bold flex items-center gap-2"><i className={`fa-solid ${icon} text-teal-500 text-xl`}></i> {title}</h3>
                            </div>
                            <div className="p-5">
                              <button onClick={() => handleSpeak(tabData.text, activeTab === "listening")} className={`w-full text-left p-5 rounded-xl transition-all shadow-sm border ${innerBg}`}>
                                <p className={`text-lg md:text-xl leading-relaxed font-semibold whitespace-pre-wrap ${activeTab === 'listening' ? 'italic text-slate-300' : 'text-slate-700'}`}>{tabData.text}</p>
                              </button>
                            </div>
                            {tabData.questions && tabData.questions.length > 0 && (
                                <div className={`p-5 border-t ${headClass}`}>
                                <h4 className={`text-xs font-bold uppercase tracking-wider mb-4 flex items-center gap-1.5 ${activeTab==='listening'?'text-slate-400':'text-slate-500'}`}>
                                    <i className="fa-regular fa-circle-question text-base"></i> Comprehension Check
                                </h4>
                                <ul className="space-y-3">
                                    {tabData.questions.map((q, i) => {
                                        const cleanQ = q.replace(/\s*\((True|False|Not Given)\)/i, '');
                                        return (
                                        <li key={i}>
                                            <button onClick={() => handleSpeak(cleanQ)} className={`w-full text-left p-4 rounded-lg text-base md:text-lg font-bold shadow-sm transition-colors border ${activeTab==='reading'?'bg-white hover:bg-slate-100 border-slate-200 text-slate-700':'bg-slate-900 hover:bg-slate-700 border-slate-700 text-slate-300'}`}>
                                                {cleanQ}
                                            </button>
                                        </li>
                                    )})}
                                </ul>
                                </div>
                            )}
                          </div>
                        );
                      })()}

                      {/* GRAMMAR */}
                      {activeTab === "grammar" && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                          <h3 className="text-lg md:text-xl font-bold text-indigo-900 mb-4 flex items-center gap-2"><i className="fa-solid fa-pen-to-square text-indigo-500"></i> Grammar Focus: {activeUnit.grammar.topic}</h3>
                          <div className="mb-6">
                            <button onClick={() => handleSpeak(activeUnit.grammar.focus)} className="w-full text-left transition-colors rounded-xl mb-5">
                              <p className="text-base md:text-lg font-bold text-slate-800 bg-slate-100 p-4 rounded-xl border border-slate-200 leading-relaxed">{activeUnit.grammar.focus}</p>
                            </button>
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1 mb-3">Example Sentences</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              {activeUnit.grammar.examples.map((ex, idx) => (
                                 <button key={idx} onClick={() => handleSpeak(ex)} className="text-left bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 p-3.5 rounded-xl transition-all text-sm md:text-base font-semibold text-slate-700 shadow-sm">
                                 "{ex}"
                                </button>
                              ))}
                            </div>
                          </div>
                          <button onClick={() => handleSpeak(activeUnit.grammar.model)} className="w-full text-left bg-indigo-50 border border-indigo-200 p-5 rounded-xl transition-all shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                            <div className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-2">Usage Model</div>
                            <p className="text-lg md:text-xl text-indigo-900 font-bold italic">"{activeUnit.grammar.model}"</p>
                          </button>
                        </div>
                      )}

                      {/* ANALYSIS */}
                      {activeTab === "analysis" && (
                          <InteractiveParagraph data={activeUnit.paragraphAnalysis} handleSpeak={handleSpeak} /> 
                      )}

                      {/* TESTING */}
                      {activeTab === "testing" && (
                        <div className="space-y-5">
                          {activeUnit.tutorPrompts && activeUnit.tutorPrompts.length > 0 && (
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                              <div className="space-y-4">
                                {activeUnit.tutorPrompts.map((prompt, idx) => (
                                  <div key={idx} className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden mb-3 shadow-sm">
                                    <div className="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                      <span className="font-bold text-slate-800 text-sm">{prompt.type}</span>
                                      <span className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider bg-indigo-50 px-2 py-1 rounded-md">{prompt.focus}</span>
                                    </div>
                                    <div className="p-4">
                                      <button onClick={() => handleSpeak(prompt.text)} className="w-full text-left bg-white border border-slate-200 p-4 rounded-lg shadow-sm hover:border-teal-300 transition-colors mb-4">
                                        <p className="text-lg md:text-xl text-slate-800 font-bold italic">"{prompt.text}"</p>
                                      </button>
                                      <div className="space-y-2 pl-3 border-l-2 border-slate-300 mt-2">
                                        {prompt.questions.map((q, qIdx) => (
                                          <button key={qIdx} onClick={() => handleSpeak(q)} className="w-full text-left text-base font-bold text-slate-600 hover:text-slate-900 transition-colors">• {q}</button>
                                        ))}
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 text-slate-300">
                            <h3 className="text-lg md:text-xl font-bold text-white mb-3 flex items-center gap-2"><i className="fa-solid fa-bullseye text-rose-400"></i> Practice for the Test</h3>
                            <div className="grid grid-cols-1 gap-5 mt-4">
                              {activeUnit.practiceTests.map((test, idx) => (
                                <div key={idx} className="bg-slate-800 border border-slate-700 rounded-xl shadow-inner flex flex-col p-5">
                                  <span className="font-bold text-teal-400 text-xs mb-3 block border-b border-slate-700 pb-2">{test.type}</span>
                                  <button onClick={() => handleSpeak(test.text)} className="text-left text-xl md:text-2xl font-bold text-slate-200 mb-4 hover:text-white transition-colors">{test.text}</button>
                                  {test.modelAnswer && (
                                    <div className="mt-3 border-t border-slate-700 pt-4">
                                      <button onClick={() => toggleModelAnswer(idx)} className="flex items-center gap-2 text-xs font-bold text-indigo-400 hover:text-indigo-300 transition-colors bg-indigo-900/30 px-3 py-1.5 rounded-lg border border-indigo-500/20">
                                        <i className="fa-solid fa-eye"></i> {showModelAnswer[idx] ? "Hide Answer" : "Show Answer"}
                                      </button>
                                      {showModelAnswer[idx] && (
                                        <button onClick={() => handleSpeak(test.modelAnswer)} className="w-full text-left mt-4 p-5 bg-indigo-900/20 border border-indigo-500/30 rounded-xl text-lg md:text-xl font-medium text-slate-200 leading-relaxed italic animate-fade-in shadow-inner">{test.modelAnswer}</button>
                                      )}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
