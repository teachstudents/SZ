<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Daily Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Ultra compact checkbox for high density */
        .checkbox-custom {
            width: 0.75rem;
            height: 0.75rem;
            cursor: pointer;
            margin-right: 0.2rem;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-1 md:p-2">

    <div class="w-full max-w-[100%] mx-auto bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
        
        <!-- Minimalist Controls (Titles Removed) -->
        <div class="bg-indigo-700 px-4 py-2 text-white flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <input type="date" id="datePicker" class="px-2 py-1 bg-indigo-600 text-white rounded border border-indigo-500 focus:outline-none text-xs">
                </div>
                <div class="flex items-center gap-2">
                    <select id="classSelector" class="px-2 py-1 bg-indigo-600 text-white rounded border border-indigo-500 focus:outline-none text-xs cursor-pointer">
                        <!-- Options loaded via JS -->
                    </select>
                </div>
            </div>
            
            <button onclick="exportToCSV()" class="bg-emerald-500 hover:bg-emerald-400 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center shadow-sm">
                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                CSV
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse table-fixed">
                <!-- Headers hidden to save space as requested, defining column widths only -->
                <colgroup>
                    <col class="w-[15%]"> <!-- Name -->
                    <col class="w-[39%]"> <!-- Positives (3 columns) -->
                    <col class="w-[39%]"> <!-- Negatives (3 columns) -->
                    <col class="w-[7%]">  <!-- Score -->
                </colgroup>
                <tbody id="studentTableBody" class="text-xs divide-y divide-slate-200">
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const schoolData = {
            "Grade 7 - Class 1": [
                { en: "Chen Wei", pinyin: "Chén Wěi", zh: "陈伟" },
                { en: "Li Na", pinyin: "Lǐ Nà", zh: "李娜" },
                { en: "Wang Lei", pinyin: "Wáng Lěi", zh: "王磊" },
                { en: "Zhang Min", pinyin: "Zhāng Mǐn", zh: "张敏" },
                { en: "Liu Yang", pinyin: "Liú Yáng", zh: "刘洋" },
                { en: "Zhao Qiang", pinyin: "Zhào Qiáng", zh: "赵强" },
                { en: "Sun Li", pinyin: "Sūn Lì", zh: "孙丽" },
                { en: "Zhou Jie", pinyin: "Zhōu Jié", zh: "周杰" },
                { en: "Wu Hao", pinyin: "Wú Hào", zh: "吴浩" },
                { en: "Zheng Fei", pinyin: "Zhèng Fēi", zh: "郑飞" },
                { en: "Feng Lin", pinyin: "Féng Lín", zh: "冯林" },
                { en: "Chen Hao", pinyin: "Chén Hào", zh: "陈浩" },
                { en: "Chu Tian", pinyin: "Chǔ Tiān", zh: "楚天" },
                { en: "Wei Hua", pinyin: "Wèi Huá", zh: "卫华" },
                { en: "Jiang Wen", pinyin: "Jiāng Wén", zh: "姜文" },
                { en: "Lin Tao", pinyin: "Lín Tāo", zh: "林涛" },
                { en: "Han Mei", pinyin: "Hán Měi", zh: "韩梅" },
                { en: "Guo Jing", pinyin: "Guō Jìng", zh: "郭靖" },
                { en: "Huang Rong", pinyin: "Huáng Róng", zh: "黄蓉" },
                { en: "Yang Guo", pinyin: "Yáng Guò", zh: "杨过" },
                { en: "Xiao Long Nu", pinyin: "Xiǎo Lóng Nǚ", zh: "小龙女" },
                { en: "Qiao Feng", pinyin: "Qiáo Fēng", zh: "乔峰" },
                { en: "Duan Yu", pinyin: "Duàn Yù", zh: "段誉" },
                { en: "Xu Zhu", pinyin: "Xū Zhú", zh: "虚竹" },
                { en: "Wang Yuyan", pinyin: "Wáng Yǔyān", zh: "王语嫣" }
            ],
            "Grade 7 - Class 2": [
                { en: "Test Student", pinyin: "Cè Shì", zh: "测试" }
            ]
        };

        const behaviors = {
            // 6 Positives
            positive: [
                { id: 'p4', label: 'Strong Participation', points: 1 },
                { id: 'p5', label: 'Organized Desk/Mat.', points: 1 },
                { id: 'p6', label: 'Used Target Vocab', points: 2 },
                { id: 'p7', label: 'Prepared for Class', points: 1 },
                { id: 'p9', label: 'Volunteered', points: 2 },
                { id: 'p11', label: 'Asked Good Qs', points: 1 }
            ],
            // 6 Negatives
            negative: [
                { id: 'n2', label: 'Arguing / Rude', points: -3 },
                { id: 'n3', label: 'Distracting Others', points: -1 },
                { id: 'n4', label: 'Refused to Participate', points: -2 },
                { id: 'n6', label: 'Lost Materials', points: -1 },
                { id: 'n7', label: 'Inappropriate Device', points: -2 },
                { id: 'n11', label: 'Cheating / Copying', points: -3 }
            ]
        };

        const BASE_SCORE = 10;

        const datePicker = document.getElementById('datePicker');
        const classSelector = document.getElementById('classSelector');
        const tableBody = document.getElementById('studentTableBody');

        function init() {
            const today = new Date().toISOString().split('T')[0];
            datePicker.value = today;

            classSelector.innerHTML = '';
            for (const className in schoolData) {
                const option = document.createElement('option');
                option.value = className;
                option.textContent = className;
                classSelector.appendChild(option);
            }

            classSelector.addEventListener('change', renderTable);
            renderTable();
        }

        function renderTable() {
            const selectedClass = classSelector.value;
            const students = schoolData[selectedClass] || [];
            tableBody.innerHTML = '';

            students.forEach((studentObj) => {
                const studentId = studentObj.en.replace(/\s+/g, '-');
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                // 1. Name Column (Ultra condensed - 2 lines max to save vertical space)
                const tdName = document.createElement('td');
                tdName.className = 'px-1.5 py-0.5 border-r border-slate-100 align-middle';
                tdName.innerHTML = `
                    <div class="flex items-baseline gap-1 truncate">
                        <span class="font-bold text-slate-800 text-[11px]">${studentObj.en}</span>
                        <span class="text-[10px] text-slate-600 font-medium">${studentObj.zh}</span>
                    </div>
                    <div class="text-[9px] text-slate-400 leading-none truncate">${studentObj.pinyin}</div>
                `;
                tr.appendChild(tdName);

                // 2. Positive Behaviors (3 Columns)
                const tdPos = document.createElement('td');
                tdPos.className = 'px-1 py-0.5 border-r border-slate-100 bg-emerald-50/20';
                tdPos.innerHTML = `<div class="grid grid-cols-3 gap-x-1 gap-y-0">` + 
                    behaviors.positive.map(b => `
                        <label class="flex items-center text-[9px] text-slate-600 hover:text-emerald-700 cursor-pointer whitespace-nowrap overflow-hidden">
                            <input type="checkbox" class="checkbox-custom text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 behavior-cb" 
                                data-points="${b.points}" data-label="${b.label}" data-student="${studentId}">
                            <span class="truncate">${b.label} <span class="text-emerald-500/70">+${b.points}</span></span>
                        </label>
                    `).join('') + `</div>`;
                tr.appendChild(tdPos);

                // 3. Negative Behaviors (3 Columns)
                const tdNeg = document.createElement('td');
                tdNeg.className = 'px-1 py-0.5 border-r border-slate-100 bg-red-50/20';
                tdNeg.innerHTML = `<div class="grid grid-cols-3 gap-x-1 gap-y-0">` + 
                    behaviors.negative.map(b => `
                        <label class="flex items-center text-[9px] text-slate-600 hover:text-red-700 cursor-pointer whitespace-nowrap overflow-hidden">
                            <input type="checkbox" class="checkbox-custom text-red-600 border-slate-300 rounded focus:ring-red-500 behavior-cb" 
                                data-points="${b.points}" data-label="${b.label}" data-student="${studentId}">
                            <span class="truncate">${b.label} <span class="text-red-500/70">${b.points}</span></span>
                        </label>
                    `).join('') + `</div>`;
                tr.appendChild(tdNeg);

                // 4. Score Column (Far Right, pushed to the edge)
                const tdScore = document.createElement('td');
                tdScore.className = 'px-1 py-0.5 align-middle text-right pr-4 md:pr-8';
                tdScore.innerHTML = `<span class="inline-flex items-center justify-center w-6 h-6 text-xs font-bold rounded bg-slate-200 text-slate-700 score-display shadow-inner" id="score-${studentId}">${BASE_SCORE}</span>`;
                tr.appendChild(tdScore);

                tableBody.appendChild(tr);
            });

            document.querySelectorAll('.behavior-cb').forEach(cb => {
                cb.addEventListener('change', calculateScores);
            });
        }

        function calculateScores() {
            const selectedClass = classSelector.value;
            const students = schoolData[selectedClass] || [];

            students.forEach(studentObj => {
                const studentId = studentObj.en.replace(/\s+/g, '-');
                let currentScore = BASE_SCORE;
                const checkboxes = document.querySelectorAll(`input[data-student="${studentId}"]:checked`);
                
                checkboxes.forEach(box => {
                    currentScore += parseInt(box.dataset.points);
                });

                const scoreDisplay = document.getElementById(`score-${studentId}`);
                if (scoreDisplay) {
                    scoreDisplay.textContent = currentScore;
                    
                    if (currentScore > BASE_SCORE) {
                        scoreDisplay.className = "inline-flex items-center justify-center w-6 h-6 text-xs font-bold rounded bg-emerald-500 text-white score-display shadow-sm";
                    } else if (currentScore < BASE_SCORE) {
                        scoreDisplay.className = "inline-flex items-center justify-center w-6 h-6 text-xs font-bold rounded bg-red-500 text-white score-display shadow-sm";
                    } else {
                        scoreDisplay.className = "inline-flex items-center justify-center w-6 h-6 text-xs font-bold rounded bg-slate-200 text-slate-700 score-display shadow-inner";
                    }
                }
            });
        }

        function exportToCSV() {
            const date = datePicker.value;
            const selectedClass = classSelector.value;
            const students = schoolData[selectedClass] || [];
            
            let csvContent = "Date,Class,English Name,Pinyin,Chinese Name,Base Score,Final Score,Behaviors Logged\n";

            students.forEach(studentObj => {
                const studentId = studentObj.en.replace(/\s+/g, '-');
                let currentScore = BASE_SCORE;
                let loggedBehaviors = [];
                
                const checkboxes = document.querySelectorAll(`input[data-student="${studentId}"]:checked`);
                checkboxes.forEach(box => {
                    currentScore += parseInt(box.dataset.points);
                    loggedBehaviors.push(box.dataset.label);
                });

                const behaviorsString = `"${loggedBehaviors.join(', ')}"`;
                csvContent += `${date},${selectedClass},${studentObj.en},${studentObj.pinyin},${studentObj.zh},${BASE_SCORE},${currentScore},${behaviorsString}\n`;
            });

            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Performance_${selectedClass.replace(/\s+/g, '')}_${date}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>
