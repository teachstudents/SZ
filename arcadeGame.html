<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #050510;
            color: #fff; font-family: 'Press Start 2P', cursive; touch-action: none;
        }
        
        .crt::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; pointer-events: none; z-index: 10;
        }

        canvas {
            display: block; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transition: transform 0.05s ease-in-out;
            background: #000;
        }

        .shake { transform: translate(5px, 5px) rotate(1deg); }
        .shake-intense { transform: translate(-10px, 10px) rotate(-2deg); }

        .btn {
            position: relative; background: transparent; color: #0ff;
            border: 2px solid #0ff; padding: 15px 30px;
            font-family: 'Press Start 2P', cursive; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff; text-shadow: 0 0 5px #0ff;
        }
        
        .btn:hover { background: #0ff; color: #000; }
        
        #ui-layer { pointer-events: none; }
        #ui-layer button { pointer-events: auto; }
        
        /* Custom scrollbar for menu */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050510; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center crt">
    
    <!-- Main Menu -->
    <div id="main-menu" class="absolute inset-0 flex flex-col items-center justify-start bg-black/90 z-50 overflow-y-auto py-12">
        <h1 class="text-3xl md:text-6xl mb-2 text-center text-cyan-400 drop-shadow-[0_0_15px_rgba(0,255,255,0.8)] mt-4">ARCADE HUB</h1>
        <p class="mb-10 text-pink-500 text-xs md:text-sm text-center max-w-md leading-relaxed drop-shadow-[0_0_8px_rgba(255,0,255,0.8)] animate-pulse">
            SELECT A GAME TO PLAY
        </p>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full max-w-5xl px-6 pb-12">
            
            <div class="col-span-full mt-2 mb-2 flex items-center justify-center">
                <div class="h-px bg-gradient-to-r from-transparent via-cyan-400 to-transparent w-full opacity-50"></div>
                <span class="px-4 text-cyan-400 text-sm tracking-widest text-center whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,255,255,0.8)]">THE CLASSICS</span>
                <div class="h-px bg-gradient-to-r from-transparent via-cyan-400 to-transparent w-full opacity-50"></div>
            </div>
            
            <button class="btn !p-3 !text-[10px] md:!text-xs" onclick="startGame('pong')">Neon Pong</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#f0f; border-color:#f0f; box-shadow: 0 0 10px #f0f, inset 0 0 10px #f0f;" onclick="startGame('breakout')">Breakout</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#0f0; border-color:#0f0; box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0;" onclick="startGame('snake')">Cyber Snake</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#ff0; border-color:#ff0; box-shadow: 0 0 10px #ff0, inset 0 0 10px #ff0;" onclick="startGame('invaders')">Invaders</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#f90; border-color:#f90; box-shadow: 0 0 10px #f90, inset 0 0 10px #f90;" onclick="startGame('asteroids')">Asteroids</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#08f; border-color:#08f; box-shadow: 0 0 10px #08f, inset 0 0 10px #08f;" onclick="startGame('dodge')">Matrix Dodge</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#fff; border-color:#fff; box-shadow: 0 0 10px #fff, inset 0 0 10px #fff;" onclick="startGame('catch')">Data Catch</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#a0f; border-color:#a0f; box-shadow: 0 0 10px #a0f, inset 0 0 10px #a0f;" onclick="startGame('runner')">Neon Runner</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs" style="color:#f55; border-color:#f55; box-shadow: 0 0 10px #f55, inset 0 0 10px #f55;" onclick="startGame('survivor')">Survivor</button>

            <div class="col-span-full mt-6 mb-2 flex items-center justify-center">
                <div class="h-px bg-gradient-to-r from-transparent via-pink-400 to-transparent w-full opacity-50"></div>
                <span class="px-4 text-pink-400 text-sm tracking-widest text-center whitespace-nowrap drop-shadow-[0_0_8px_rgba(255,0,255,0.8)]">ARCADE ACTION</span>
                <div class="h-px bg-gradient-to-r from-transparent via-pink-400 to-transparent w-full opacity-50"></div>
            </div>

            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-green-500 to-emerald-800 !text-white shadow-[0_4px_15px_rgba(0,255,100,0.5)] transition-all" onclick="startGame('frog')">Cyber Frog</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-blue-400 to-indigo-700 !text-white shadow-[0_4px_15px_rgba(0,100,255,0.5)] transition-all" onclick="startGame('jump')">Neon Jump</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-red-500 to-rose-900 !text-white shadow-[0_4px_15px_rgba(255,0,50,0.5)] transition-all" onclick="startGame('defend')">Cyber Defend</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-gray-400 to-slate-800 !text-white shadow-[0_4px_15px_rgba(200,200,200,0.5)] transition-all" onclick="startGame('lander')">Lunar Lander</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-purple-500 to-fuchsia-800 !text-white shadow-[0_4px_15px_rgba(255,0,255,0.5)] transition-all" onclick="startGame('match')">Color Match</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-yellow-400 to-orange-600 !text-black shadow-[0_4px_15px_rgba(255,200,0,0.5)] font-bold transition-all" onclick="startGame('racer')">Neon Racer</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-blue-500 to-cyan-500 !text-white shadow-[0_4px_15px_rgba(0,150,255,0.5)] transition-all" onclick="startGame('dash')">Cyber Dash</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-red-600 to-black !text-red-200 border border-red-500 shadow-[0_4px_15px_rgba(255,0,0,0.5)] transition-all" onclick="startGame('ninja')">Shinobi Star</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-sky-400 to-blue-800 !text-white shadow-[0_4px_15px_rgba(0,200,255,0.5)] transition-all" onclick="startGame('harrier')">Z-Shooter</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-purple-600 to-indigo-900 !text-fuchsia-200 shadow-[0_4px_15px_rgba(150,0,255,0.5)] transition-all" onclick="startGame('columns')">Hex Columns</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-yellow-300 to-yellow-600 !text-black shadow-[0_4px_15px_rgba(255,255,0,0.5)] transition-all" onclick="startGame('cab')">Crazy Hover</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-orange-500 to-red-700 !text-white shadow-[0_4px_15px_rgba(255,100,0,0.5)] transition-all" onclick="startGame('brawler')">Street Clash</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-blue-800 to-black !text-yellow-400 border border-blue-500 shadow-[0_4px_15px_rgba(0,0,255,0.5)] transition-all" onclick="startGame('maze')">Grid Eater</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-indigo-500 to-purple-500 !text-white shadow-[0_4px_15px_rgba(100,0,255,0.5)] transition-all" onclick="startGame('defender')">Zone Guard</button>

            <div class="col-span-full mt-6 mb-2 flex items-center justify-center">
                <div class="h-px bg-gradient-to-r from-transparent via-purple-400 to-transparent w-full opacity-50"></div>
                <span class="px-4 text-purple-400 text-sm tracking-widest text-center whitespace-nowrap drop-shadow-[0_0_8px_rgba(150,0,255,0.8)]">MODERN & PUZZLE</span>
                <div class="h-px bg-gradient-to-r from-transparent via-purple-400 to-transparent w-full opacity-50"></div>
            </div>

            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-teal-400 to-emerald-500 !text-white shadow-[0_4px_15px_rgba(0,255,150,0.5)] transition-all" onclick="startGame('luminesce')">Luminesce</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-blue-500 to-cyan-400 !text-white shadow-[0_4px_15px_rgba(0,150,255,0.5)] transition-all" onclick="startGame('drift')">Neon Drift</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-indigo-600 to-blue-800 !text-blue-200 shadow-[0_4px_15px_rgba(50,50,255,0.5)] transition-all" onclick="startGame('orbit')">Gravity Orbit</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-fuchsia-600 to-purple-800 !text-fuchsia-200 shadow-[0_4px_15px_rgba(255,0,255,0.5)] transition-all" onclick="startGame('quantum')">Quantum Dash</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-pink-600 to-rose-500 !text-white shadow-[0_4px_15px_rgba(255,50,100,0.5)] transition-all" onclick="startGame('chroma')">Chroma Core</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-slate-800 to-black !text-teal-300 border border-teal-700 shadow-[0_4px_15px_rgba(0,255,200,0.3)] transition-all" onclick="startGame('labyrinth')">Labyrinth</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-violet-500 to-fuchsia-600 !text-white shadow-[0_4px_15px_rgba(200,0,255,0.5)] transition-all" onclick="startGame('prism')">Prism Break</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-cyan-600 to-blue-900 !text-cyan-100 shadow-[0_4px_15px_rgba(0,200,255,0.5)] transition-all" onclick="startGame('aegis')">Aegis Strike</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-yellow-400 to-orange-600 !text-black shadow-[0_4px_15px_rgba(255,200,0,0.5)] font-bold transition-all" onclick="startGame('circuit')">Circuit Flow</button>

            <div class="col-span-full mt-6 mb-2 flex items-center justify-center">
                <div class="h-px bg-gradient-to-r from-transparent via-green-400 to-transparent w-full opacity-50"></div>
                <span class="px-4 text-green-400 text-sm tracking-widest text-center whitespace-nowrap drop-shadow-[0_0_8px_rgba(0,255,100,0.8)]">NEXT-GEN PHYSICS</span>
                <div class="h-px bg-gradient-to-r from-transparent via-green-400 to-transparent w-full opacity-50"></div>
            </div>

            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-indigo-500 to-cyan-400 !text-white shadow-[0_4px_15px_rgba(0,255,200,0.5)] transition-all" onclick="startGame('synthbeat')">Synth Beat</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-rose-500 to-purple-600 !text-white shadow-[0_4px_15px_rgba(255,0,150,0.5)] transition-all" onclick="startGame('swing')">Cyber Swing</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-emerald-400 to-teal-700 !text-white shadow-[0_4px_15px_rgba(0,255,100,0.5)] transition-all" onclick="startGame('burst')">Vector Burst</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-slate-700 to-slate-900 !text-cyan-300 border border-cyan-500 shadow-[0_4px_15px_rgba(0,100,255,0.5)] transition-all" onclick="startGame('defense')">Data Defense</button>

            <div class="col-span-full mt-6 mb-2 flex items-center justify-center">
                <div class="h-px bg-gradient-to-r from-transparent via-yellow-400 to-transparent w-full opacity-50"></div>
                <span class="px-4 text-yellow-400 text-sm tracking-widest text-center whitespace-nowrap drop-shadow-[0_0_8px_rgba(255,255,0,0.8)]">TACTILE & RHYTHM</span>
                <div class="h-px bg-gradient-to-r from-transparent via-yellow-400 to-transparent w-full opacity-50"></div>
            </div>

            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-fuchsia-600 to-pink-500 !text-white shadow-[0_4px_15px_rgba(255,0,255,0.5)] font-mono transition-all" onclick="startGame('typist')">Neon Typist</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-yellow-300 to-orange-500 !text-black shadow-[0_4px_15px_rgba(255,255,0,0.5)] font-bold transition-all" onclick="startGame('popgrid')">Pop Grid</button>
            <button class="btn !p-3 !text-[10px] md:!text-xs !border-0 !rounded-xl !bg-gradient-to-br from-green-400 to-emerald-600 !text-white shadow-[0_4px_15px_rgba(0,255,0,0.5)] transition-all" onclick="startGame('spark')">Spark Node</button>

        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="relative w-full h-full max-w-4xl max-h-[800px] hidden flex items-center justify-center p-4">
        <div class="scanlines"></div>
        <canvas id="gameCanvas"></canvas>
        
        <!-- In-Game UI Overlay -->
        <div id="ui-layer" class="absolute inset-0 flex flex-col justify-between p-6">
            <div class="flex justify-between items-start w-full">
                <div id="score-display" class="text-xl md:text-2xl text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">0000</div>
                <button class="btn !p-2 !text-[10px] md:!text-xs !box-shadow-none" onclick="returnToMenu()">Quit</button>
            </div>
            <div id="lives-display" class="text-lg md:text-xl text-pink-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.8)]"></div>
            
            <div id="instructions-display" class="absolute bottom-8 left-0 right-0 text-center text-[10px] md:text-xs text-cyan-200 drop-shadow-md animate-pulse pointer-events-none px-4 bg-black/30 py-2"></div>
        </div>

        <!-- Game Over Modal -->
        <div id="game-over" class="absolute inset-0 bg-black/90 hidden flex-col items-center justify-center z-40">
            <h2 id="game-over-title" class="text-3xl md:text-5xl text-red-500 mb-6 drop-shadow-[0_0_20px_rgba(255,0,0,1)] text-center">GAME OVER</h2>
            <p id="final-score" class="text-lg md:text-xl text-white mb-8 text-center">Score: 0</p>
            <div class="flex flex-col md:flex-row gap-4">
                <button class="btn" id="btn-restart">Play Again</button>
                <button class="btn !border-gray-500 !text-gray-500" onclick="returnToMenu()">Menu</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const sfx = {
            playTone: (freq, type, duration, vol = 0.1) => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            },
            bounce: () => sfx.playTone(400, 'square', 0.1, 0.1),
            paddleHit: () => sfx.playTone(600, 'square', 0.1, 0.15),
            score: () => { sfx.playTone(800, 'sine', 0.1, 0.1); setTimeout(() => sfx.playTone(1200, 'sine', 0.2, 0.1), 100); },
            brickHit: () => sfx.playTone(300, 'sawtooth', 0.1, 0.1),
            explosion: () => {
                if (!audioCtx) return;
                const bufferSize = audioCtx.sampleRate * 0.3;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; 
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime); filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
            },
            powerUp: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            },
            kick: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let animationId; let currentGame = null; let particles = [];
        const keys = {}; let mouseX = 0; let mouseY = 0;

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => keys['mouseDown'] = true);
        window.addEventListener('mouseup', () => keys['mouseDown'] = false);
        window.addEventListener('touchstart', () => keys['mouseDown'] = true, {passive: true});
        window.addEventListener('touchend', () => keys['mouseDown'] = false, {passive: true});
        
        function handlePointer(e) {
            if (document.getElementById('game-container').classList.contains('hidden')) return;
            const rect = canvas.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouseX = (clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (clientY - rect.top) * (canvas.height / rect.height);
            
            if(currentGame === 'pong') pong.player.y = mouseY - pong.player.height / 2;
            else if (currentGame === 'breakout') breakout.paddle.x = mouseX - breakout.paddle.width / 2;
            else if (currentGame === 'luminesce') { luminesce.p.x = mouseX; luminesce.p.y = mouseY; }
        }
        
        window.addEventListener('mousemove', handlePointer);
        window.addEventListener('touchmove', (e) => { if(currentGame) e.preventDefault(); handlePointer(e); }, { passive: false });

        function resizeCanvas() {
            if (document.getElementById('game-container').classList.contains('hidden')) return;
            canvas.width = 800; canvas.height = 600;
            ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
        }
        window.addEventListener('resize', resizeCanvas);

        function setScore(text) { document.getElementById('score-display').innerHTML = text; }
        function setLives(text) { document.getElementById('lives-display').innerText = text; }
        function screenShake(intensity = 'normal') {
            canvas.classList.remove('shake', 'shake-intense'); void canvas.offsetWidth;
            canvas.classList.add(intensity === 'intense' ? 'shake-intense' : 'shake');
            setTimeout(() => canvas.classList.remove('shake', 'shake-intense'), 100);
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02;

            init() { this.score=0; this.cash=100; this.lives=20; this.t=[]; this.c=[]; this.f=0; this.p=[{x:0,y:100},{x:600,y:100},{x:600,y:300},{x:200,y:300},{x:200,y:500},{x:800,y:500}]; setScore(`CASH: $${this.cash}`); setLives(`HP: ${this.lives}`); },
            update() {
                if(mouseX!==0 && Date.now()-this.last>300) { if(this.cash>=50){this.t.push({x:mouseX,y:mouseY,r:100,cd:0}); this.cash-=50; sfx.paddleHit(); setScore(`CASH: $${this.cash} | PTS: ${this.score}`);} else sfx.bounce(); this.last=Date.now(); mouseX=0; }
                if(this.f%Math.max(30,90-Math.floor(this.score/20))===0) this.c.push({x:this.p[0].x,y:this.p[0].y,pi:1,hp:3+this.score/100,mhp:3+this.score/100});
                this.c.forEach(c=>{
                    let tgt=this.p[c.pi], dx=tgt.x-c.x, dy=tgt.y-c.y, d=Math.hypot(dx,dy);
                    if(d<2){c.x=tgt.x; c.y=tgt.y; c.pi++; if(c.pi>=this.p.length){c.d=true; this.lives--; setLives(`HP: ${this.lives}`); sfx.explosion(); screenShake(); if(this.lives<=0)showGameOver('COMPROMISED',`Score: ${this.score}`);}}
                    else {c.x+=(dx/d)*2; c.y+=(dy/d)*2;}
                });
                this.t.forEach(t=>{
                    if(t.cd>0) t.cd--;
                    else {
                        let cls=null, md=t.r; this.c.forEach(c=>{let d=Math.hypot(c.x-t.x,c.y-t.y); if(d<md&&!c.d){md=d;cls=c;}});
                        if(cls){ cls.hp--; t.cd=30; sfx.brickHit(); particles.push({l:0.1, d:0.02, x:t.x, y:t.y, tx:cls.x, ty:cls.y, update(){this.l-=this.d;}, draw(ctx){ctx.strokeStyle=`rgba(0,255,255,${this.l*10})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.tx,this.ty);ctx.stroke();} });
                        if(cls.hp<=0){cls.d=true; this.cash+=5; this.score+=10; setScore(`CASH: $${this.cash} | PTS: ${this.score}`); createExplosion(cls.x,cls.y,'#f05',10);} }
                    }
                });
                this.c=this.c.filter(c=>!c.d); this.f++;
            },
            draw(ctx) {
                ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,800,600);
                ctx.strokeStyle='#223'; ctx.lineWidth=30; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.beginPath(); ctx.moveTo(this.p[0].x,this.p[0].y); for(let i=1;i<this.p.length;i++) ctx.lineTo(this.p[i].x,this.p[i].y); ctx.stroke();
                this.t.forEach(t=>{ ctx.fillStyle='#0ff'; ctx.shadowBlur=10; ctx.shadowColor='#0ff'; ctx.fillRect(t.x-10,t.y-10,20,20); ctx.strokeStyle='rgba(0,255,255,0.1)'; ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.stroke(); });
                this.c.forEach(c=>{ ctx.fillStyle='#f05'; ctx.shadowBlur=10; ctx.shadowColor='#f05'; ctx.beginPath(); ctx.arc(c.x,c.y,8,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#333'; ctx.fillRect(c.x-10,c.y-15,20,4); ctx.fillStyle='#0f0'; ctx.fillRect(c.x-10,c.y-15,20*(c.hp/c.mhp),4); }); ctx.shadowBlur=0;
            }
        };

        const typist = {
            score:0, l:[], f:0, pK:{}, s:2,
            init() { this.score=0; this.l=[]; this.f=0; this.s=2; setScore('SCORE: 0'); setLives(''); },
            update() {
                if(this.f%Math.max(15, 60-Math.floor(this.score/50))===0) { let c=65+Math.floor(Math.random()*26); this.l.push({x:50+Math.random()*700, y:-50, c:String.fromCharCode(c), k:'Key'+String.fromCharCode(c)}); }
                for(let i=65; i<=90; i++) {
                    let k='Key'+String.fromCharCode(i);
                    if(keys[k]&&!this.pK[k]) {
                        let mi=-1, my=-100; for(let j=0;j<this.l.length;j++) if(this.l[j].k===k && this.l[j].y>my){my=this.l[j].y;mi=j;}
                        if(mi>=0){ let c=this.l.splice(mi,1)[0]; this.score+=10; setScore(`SCORE: ${this.score}`); sfx.paddleHit(); createExplosion(c.x,c.y,'#0ff',10); } else { this.score=Math.max(0,this.score-5); setScore(`SCORE: ${this.score}`); sfx.brickHit(); screenShake(); }
                    } this.pK[k]=keys[k];
                }
                this.l.forEach(l=>{ l.y+=this.s+this.score/500; if(l.y>600){sfx.explosion();screenShake('intense');showGameOver('TYPO',`Score: ${this.score}`);} }); this.f++;
            },
            draw(ctx) {
                ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,800,600); ctx.font='30px "Press Start 2P"'; ctx.textAlign='center'; ctx.textBaseline='middle';
                this.l.forEach(l=>{ ctx.fillStyle='#f0f'; ctx.shadowBlur=10; ctx.shadowColor='#f0f'; ctx.fillText(l.c,l.x,l.y); }); ctx.shadowBlur=0;
            }
        };

        const popgrid = {
            score:0, g:Array(9).fill(0), t:600, f:0, pK:{}, m:['KeyQ','KeyW','KeyE','KeyA','KeyS','KeyD','KeyZ','KeyX','KeyC'],
            init() { this.score=0; this.g=Array(9).fill(0); this.t=600; this.f=0; setScore('PTS: 0'); setLives('TIME: 10.0'); },
            update() {
                this.t--; setLives(`TIME: ${(this.t/60).toFixed(1)}`); if(this.t<=0){sfx.explosion();showGameOver('TIME UP',`Score: ${this.score}`);return;}
                if(Math.random()<0.05+this.score/5000 && this.g.filter(x=>x>0).length<4){ let e=[]; this.g.forEach((v,i)=>{if(v<=0)e.push(i)}); if(e.length>0)this.g[e[Math.floor(Math.random()*e.length)]]=60; }
                for(let i=0;i<9;i++) if(this.g[i]>0) this.g[i]--;
                for(let i=0;i<9;i++){
                    let c=this.m[i], clk=false;
                    if(mouseX!==0 && keys['mouseDown'] && !this.pK['mouse']){ let gx=Math.floor((mouseX-250)/100), gy=Math.floor((mouseY-150)/100); if(gx>=0&&gx<3&&gy>=0&&gy<3&&gy*3+gx===i) clk=true; }
                    if((keys[c]&&!this.pK[c])||clk){
                        if(this.g[i]>0){ this.score+=10; this.t+=15; this.g[i]=0; sfx.score(); setScore(`PTS: ${this.score}`); createExplosion(250+(i%3)*100+50, 150+Math.floor(i/3)*100+50, '#ff0', 10); }
                        else { this.t-=30; sfx.brickHit(); screenShake(); }
                    } this.pK[c]=keys[c];
                } this.pK['mouse']=keys['mouseDown'];
            },
            draw(ctx) {
                ctx.fillStyle='#111'; ctx.fillRect(0,0,800,600);
                for(let i=0;i<9;i++){ let x=250+(i%3)*100, y=150+Math.floor(i/3)*100; ctx.strokeStyle='#333'; ctx.lineWidth=4; ctx.strokeRect(x,y,90,90);
                    if(this.g[i]>0){ctx.fillStyle=`rgba(255,255,0,${this.g[i]/60})`; ctx.shadowBlur=20; ctx.shadowColor='#ff0'; ctx.fillRect(x+5,y+5,80,80); ctx.shadowBlur=0;}
                    ctx.fillStyle='#555'; ctx.font='16px "Press Start 2P"'; ctx.fillText(this.m[i].replace('Key',''),x+45,y+45); }
            }
        };

        const spark = {
            score:0, p:0, s:0.03, n:[], pS:false,
            init() { this.score=0; this.p=0; this.s=0.03; this.n=[]; this.gen(); setScore('SYNC: 0'); setLives(''); },
            gen() { this.n=[]; for(let i=0;i<4;i++) this.n.push({a:i*Math.PI/2, act:true}); },
            update() {
                this.p+=this.s; if(this.p>Math.PI*2){ this.p-=Math.PI*2; if(this.n.some(n=>n.act)){sfx.explosion();screenShake('intense');showGameOver('DESYNC',`Score: ${this.score}`);return;} else{this.gen();this.s+=0.005;} }
                let spc=keys['Space']||keys['mouseDown'];
                if(spc&&!this.pS){ let hit=false; this.n.forEach(n=>{ if(n.act){let d=Math.abs(this.p-n.a); if(d>Math.PI)d=Math.PI*2-d; if(d<0.25){n.act=false; hit=true; this.score+=10; setScore(`SYNC: ${this.score}`); sfx.score(); createExplosion(400+Math.cos(n.a)*200, 300+Math.sin(n.a)*200, '#0f0', 20);}}}); if(!hit){sfx.brickHit();screenShake();} } this.pS=spc;
            },
            draw(ctx) {
                ctx.fillStyle='#001'; ctx.fillRect(0,0,800,600); ctx.strokeStyle='#333'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(400,300,200,0,Math.PI*2); ctx.stroke();
                this.n.forEach(n=>{ ctx.fillStyle=n.act?'#0f0':'#333'; ctx.shadowBlur=n.act?15:0; ctx.shadowColor='#0f0'; ctx.beginPath(); ctx.arc(400+Math.cos(n.a)*200, 300+Math.sin(n.a)*200, 20, 0, Math.PI*2); ctx.fill(); }); ctx.shadowBlur=0;
                ctx.fillStyle='#0ff'; ctx.shadowBlur=20; ctx.shadowColor='#0ff'; ctx.beginPath(); ctx.arc(400+Math.cos(this.p)*200, 300+Math.sin(this.p)*200, 10, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            }
        };

        function startGame(gameName) {
            initAudio(); 
            document.getElementById('main-menu').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden'); document.getElementById('game-over').classList.add('hidden');
            resizeCanvas(); currentGame = gameName; particles = []; keys['mouseDown'] = false; mouseX = 0;
            
            // Map strings to their object initializers securely
            const gamesMap = {
                pong, breakout, snake, invaders, asteroids, dodge, catch: catchGame, runner, survivor,
                frog, jump, defend, lander, match,
                racer, dash, ninja, harrier, columns, cab, brawler, maze, defender,
                luminesce, drift, orbit, quantum, chroma, labyrinth, prism, aegis, circuit,
                synthbeat, swing, burst, defense,
                typist, popgrid, spark
            };
            
            if (gamesMap[gameName]) {
                gamesMap[gameName].init();
                document.getElementById('btn-restart').onclick = () => startGame(gameName);
                document.getElementById('instructions-display').innerText = gameInstructions[gameName] || 'Press Space/Arrows/Mouse to play.';
            }

            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function returnToMenu() {
            currentGame = null; if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('game-container').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('game-over').classList.add('hidden');
        }

        function showGameOver(title, subtitle) {
            currentGame = null; 
            document.getElementById('game-over').classList.remove('hidden'); document.getElementById('game-over').classList.add('flex');
            document.getElementById('game-over-title').innerText = title; document.getElementById('final-score').innerText = subtitle;
        }

        function gameLoop() {
            if (!currentGame) return;

            const gamesMap = {
                pong, breakout, snake, invaders, asteroids, dodge, catch: catchGame, runner, survivor,
                frog, jump, defend, lander, match,
                racer, dash, ninja, harrier, columns, cab, brawler, maze, defender,
                luminesce, drift, orbit, quantum, chroma, labyrinth, prism, aegis, circuit,
                synthbeat, swing, burst, defense,
                typist, popgrid, spark
            };

            if (gamesMap[currentGame]) gamesMap[currentGame].update();

            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1); }

            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gamesMap[currentGame]) gamesMap[currentGame].draw(ctx);
            particles.forEach(p => p.draw(ctx));

            animationId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
